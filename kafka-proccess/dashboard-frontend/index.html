<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>فرصة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
<header class="site-header">
    <h1 class="site-title">فرصة</h1>
    <p class="site-tagline">منصة ذكية لمطابقة الطلاب مع الفرص المناسبة</p>
</header>

<div class="simple-page">
    <main class="simple-layout">
        <section class="simple-card upload-card">
            <h2>ملف الفرصة</h2>

            <form id="uploadForm" class="upload-form">
                <label for="opportunityFile" class="file-input-label">
                اختر ملف الفرصة (PDF / DOC / DOCX / TXT)
                <input
                type="file"
                id="opportunityFile"
                accept=".json,.pdf,.doc,.docx,.txt,application/json,application/pdf"
                required
                />
                </label>

                <button type="submit" class="primary-btn">تشغيل المطابقة</button>
                <div id="status" class="status"></div>
            </form>
        </section>

        <section class="simple-card results-card">
            <div class="results-header">
                <h2>أفضل 10 طلاب مطابقين</h2>
                <div class="badge" id="resultsCount">0</div>
            </div>

            <div id="resultsList" class="results-list">
                <div class="empty-state">
                    <div class="empty-icon">🔍</div>
                    <h3>لا توجد نتائج بعد</h3>
                    <p>قم برفع ملف الفرصة لتظهر النتائج هنا</p>
                </div>
            </div>
        </section>
    </main>
</div>

<script src="app.js"></script>
</body>
</html>
